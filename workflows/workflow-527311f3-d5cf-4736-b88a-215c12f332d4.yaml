name: pulp-upgrade-check
description: >-
  Clones pulp-service, reads CLAUDE.md to discover patched packages and
  their current versions, queries PyPI for newer versions, then clones
  upstream repos and validates/regenerates/combines patches automatically.
version: 1
tags: {}
jobs:
  - name: upgrade
    description: Discover packages, check PyPI, and process all patches
    steps:
      - name: upgrade-patches
        description: Run the full upgrade pipeline
        task:
          type: model_method
          modelIdOrName: upgrade-patches
          methodName: execute
