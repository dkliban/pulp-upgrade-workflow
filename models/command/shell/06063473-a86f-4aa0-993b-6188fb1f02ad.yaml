typeVersion: 2026.02.09.1
id: 06063473-a86f-4aa0-993b-6188fb1f02ad
name: upgrade-patches
version: 1
tags: {}
globalArguments: {}
inputs:
  properties: {}
methods:
  execute:
    arguments:
      run: |
        python3 << 'PYEOF'
        import glob
        import json
        import os
        import re
        import socket
        import subprocess
        import sys
        import tempfile
        import urllib.request

        hostname = socket.gethostname()
        if hostname.startswith("alcove-task"):
            WORKDIR = "/workspace"
        else:
            WORKDIR = "/tmp/pulp-upgrade-work"
        os.makedirs(WORKDIR, exist_ok=True)

        # ── Utilities ──────────────────────────────────────────────

        def run(cmd, cwd=None, check=True, capture=True):
            r = subprocess.run(cmd, shell=True, cwd=cwd, capture_output=capture, text=True)
            if check and r.returncode != 0:
                raise RuntimeError(f"Command failed ({r.returncode}): {cmd}\n{r.stderr}")
            return r

        def resolve_tag(repo_path, version):
            r = run(f"git rev-parse --verify {version} 2>/dev/null", cwd=repo_path, check=False)
            if r.returncode == 0:
                return version
            r = run(f"git rev-parse --verify v{version} 2>/dev/null", cwd=repo_path, check=False)
            if r.returncode == 0:
                return f"v{version}"
            return None

        def filter_patch_for_prefix(patch_content, prefix):
            output_lines = []
            in_relevant = False
            pat = re.compile(rf'^diff --git a/{re.escape(prefix)}/')
            for line in patch_content.splitlines(True):
                if line.startswith("diff --git "):
                    in_relevant = bool(pat.match(line))
                if in_relevant:
                    output_lines.append(line)
            return "".join(output_lines)

        def reset_repo(repo_path, tag):
            run(f"git checkout -f {tag}", cwd=repo_path)
            run("git clean -fdx", cwd=repo_path)

        def rebuild_patch_file(original_path, patch_prefix, new_diff, original_content):
            other_hunks = []
            in_other = False
            pat = re.compile(rf'^diff --git a/{re.escape(patch_prefix)}/')
            for line in original_content.splitlines(True):
                if line.startswith("diff --git "):
                    in_other = not pat.match(line)
                if in_other:
                    other_hunks.append(line)
            rebuilt = "".join(other_hunks) + new_diff
            if rebuilt and not rebuilt.endswith("\n"):
                rebuilt += "\n"
            return rebuilt

        def find_patch_groups(patches, patch_prefix):
            file_sets = {}
            for mp in patches:
                with open(mp['path']) as f:
                    content = f.read()
                files = set()
                for m in re.finditer(r'diff --git a/(' + re.escape(patch_prefix) + r'/\S+)', content):
                    files.add(m.group(1))
                file_sets[mp['filename']] = files
            groups, used = [], set()
            for mp in patches:
                if mp['filename'] in used:
                    continue
                group = [mp]
                used.add(mp['filename'])
                gf = set(file_sets.get(mp['filename'], set()))
                changed = True
                while changed:
                    changed = False
                    for mp2 in patches:
                        if mp2['filename'] in used:
                            continue
                        if gf & file_sets.get(mp2['filename'], set()):
                            group.append(mp2)
                            used.add(mp2['filename'])
                            gf |= file_sets[mp2['filename']]
                            changed = True
                groups.append(group)
            return groups

        def regenerate_patch(repo_path, old_tag, new_tag, patch_path, patch_prefix):
            """Apply patch at old tag, diff result against new tag."""
            with open(patch_path) as f:
                full_content = f.read()
            filtered = filter_patch_for_prefix(full_content, patch_prefix)
            if not filtered.strip():
                return None, "no hunks for this package"

            with tempfile.NamedTemporaryFile(mode='w', suffix='.patch', delete=False) as tmp:
                tmp.write(filtered)
                tmp_path = tmp.name

            try:
                # Apply patch at old version (where it was designed to work)
                reset_repo(repo_path, old_tag)
                r = run(f"patch --no-backup-if-mismatch -p1 < {tmp_path}", cwd=repo_path, check=False)
                os.unlink(tmp_path)
                run("find . -name '*.orig' -o -name '*.rej' | xargs rm -f", cwd=repo_path, check=False)

                if r.returncode != 0:
                    reset_repo(repo_path, new_tag)
                    return None, f"patch does not apply at old tag {old_tag}: {r.stderr}"

                # Get list of files the patch modified
                modified = run("git diff --name-only", cwd=repo_path, check=False).stdout.strip().splitlines()
                # Also check for new files
                untracked = run("git ls-files --others --exclude-standard", cwd=repo_path, check=False).stdout.strip().splitlines()
                all_changed = [f for f in modified + untracked if f]

                if not all_changed:
                    reset_repo(repo_path, new_tag)
                    return "", "upstreamed (patch produced no changes at old tag)"

                # Save the patched file contents
                patched_files = {}
                for f in all_changed:
                    fp = os.path.join(repo_path, f)
                    if os.path.isfile(fp):
                        with open(fp) as fh:
                            patched_files[f] = fh.read()

                # Checkout new tag and compare
                reset_repo(repo_path, new_tag)

                # For each file, check if the patched content differs from new version
                diff_parts = []
                for f in all_changed:
                    fp = os.path.join(repo_path, f)
                    new_exists = os.path.isfile(fp)

                    if new_exists:
                        with open(fp) as fh:
                            new_content = fh.read()
                    else:
                        new_content = ""

                    patched_content = patched_files.get(f, "")

                    if patched_content == new_content:
                        continue  # This file's changes are upstreamed

                    # Write patched content and get diff
                    with open(fp, 'w') as fh:
                        fh.write(patched_content)

                new_diff = run("git diff", cwd=repo_path, check=False).stdout

                # Also capture any new files
                for f in untracked:
                    if f in patched_files:
                        fp = os.path.join(repo_path, f)
                        if not os.path.isfile(fp):
                            with open(fp, 'w') as fh:
                                fh.write(patched_files[f])
                        new_file_diff = run(f"git diff /dev/null -- '{f}'", cwd=repo_path, check=False).stdout
                        if new_file_diff:
                            new_diff += new_file_diff

                reset_repo(repo_path, new_tag)

                if not new_diff.strip():
                    return "", "upstreamed (all changes present in new version)"

                return new_diff, None

            except Exception as e:
                reset_repo(repo_path, new_tag)
                return None, str(e)

        def combine_patches(repo_path, old_tag, new_tag, group, patch_prefix):
            """Apply all patches in group at old tag, diff result against new tag."""
            reset_repo(repo_path, old_tag)

            for mp in group:
                with open(mp['path']) as f:
                    content = f.read()
                filtered = filter_patch_for_prefix(content, patch_prefix)
                if not filtered.strip():
                    continue
                with tempfile.NamedTemporaryFile(mode='w', suffix='.patch', delete=False) as tmp:
                    tmp.write(filtered)
                    tmp_path = tmp.name
                r = run(f"patch --no-backup-if-mismatch -p1 < {tmp_path}", cwd=repo_path, check=False)
                os.unlink(tmp_path)
                run("find . -name '*.orig' -o -name '*.rej' | xargs rm -f", cwd=repo_path, check=False)
                if r.returncode != 0:
                    reset_repo(repo_path, new_tag)
                    return None, f"{mp['filename']} does not apply at old tag"

            # Save patched state
            patched_files = {}
            modified = run("git diff --name-only", cwd=repo_path, check=False).stdout.strip().splitlines()
            untracked = run("git ls-files --others --exclude-standard", cwd=repo_path, check=False).stdout.strip().splitlines()
            for f in modified + untracked:
                if not f:
                    continue
                fp = os.path.join(repo_path, f)
                if os.path.isfile(fp):
                    with open(fp) as fh:
                        patched_files[f] = fh.read()

            # Diff against new tag
            reset_repo(repo_path, new_tag)
            for f, content in patched_files.items():
                fp = os.path.join(repo_path, f)
                os.makedirs(os.path.dirname(fp), exist_ok=True)
                with open(fp, 'w') as fh:
                    fh.write(content)

            combined_diff = run("git diff", cwd=repo_path, check=False).stdout
            reset_repo(repo_path, new_tag)

            if not combined_diff.strip():
                return "", "all changes upstreamed"
            return combined_diff, None

        def verify_patch(repo_path, new_tag, patch_path):
            """Check that a patch applies cleanly and produces valid Python."""
            reset_repo(repo_path, new_tag)
            r = run(f"patch --dry-run -p1 < {patch_path}", cwd=repo_path, check=False)
            if r.returncode != 0:
                return False, f"patch does not apply: {r.stdout}"
            run(f"patch --no-backup-if-mismatch -p1 < {patch_path}", cwd=repo_path, check=False)
            run("find . -name '*.orig' -o -name '*.rej' | xargs rm -f", cwd=repo_path, check=False)
            errors = []
            with open(patch_path) as f:
                content = f.read()
            for m in re.finditer(r'diff --git a/(\S+\.py)\s', content):
                py_file = os.path.join(repo_path, m.group(1))
                if os.path.isfile(py_file):
                    try:
                        with open(py_file) as pf:
                            compile(pf.read(), m.group(1), 'exec')
                    except SyntaxError as e:
                        errors.append(f"{m.group(1)}: {e}")
            reset_repo(repo_path, new_tag)
            if errors:
                return False, "; ".join(errors)
            return True, None

        def remove_patch_from_dockerfile(dockerfile_path, filename):
            if os.path.isfile(dockerfile_path):
                with open(dockerfile_path) as df:
                    lines = df.readlines()
                with open(dockerfile_path, 'w') as df:
                    for line in lines:
                        if filename not in line:
                            df.write(line)

        # ── Phase 0: Clone pulp-service from upstream ──────────────

        SVC_PATH = os.path.join(WORKDIR, "pulp-service")
        if os.path.isdir(os.path.join(SVC_PATH, ".git")):
            run("git fetch origin", cwd=SVC_PATH)
            run("git checkout -f main", cwd=SVC_PATH)
            run("git reset --hard origin/main", cwd=SVC_PATH)
            run("git clean -fdx", cwd=SVC_PATH)
        else:
            run(f"git clone https://github.com/pulp/pulp-service.git {SVC_PATH}")

        # ── Phase 1: Parse CLAUDE.md ───────────────────────────────

        claude_path = os.path.join(SVC_PATH, "images", "assets", "patches", "CLAUDE.md")
        with open(claude_path) as f:
            claude_content = f.read()

        table_row = re.compile(
            r'\|\s*`([^`]+)/`\s*\|'
            r'\s*\[([^\]]+)\]\(([^)]+)\)\s*\|'
            r'\s*(\S+)\s*\|'
            r'\s*(\S+)\s*\|'
        )

        packages = []
        for m in table_row.finditer(claude_content):
            prefix = m.group(1)
            gh_url = m.group(3)
            pypi_pkg = m.group(4)
            cur_ver = m.group(5)
            if pypi_pkg == "(bundled)":
                continue
            parts = gh_url.rstrip('/').split('/')
            gh_org, gh_repo = parts[-2], parts[-1]
            packages.append({
                "package": pypi_pkg, "ghOrg": gh_org, "ghRepo": gh_repo,
                "patchDirPrefix": prefix, "currentVersion": cur_ver,
            })

        print(f"Parsed {len(packages)} packages from CLAUDE.md", file=sys.stderr)

        # ── Phase 2: Query PyPI ────────────────────────────────────

        packages_to_upgrade = []
        for pkg in packages:
            try:
                url = f"https://pypi.org/pypi/{pkg['package']}/json"
                resp = urllib.request.urlopen(url, timeout=15)
                data = json.loads(resp.read())
                latest = data["info"]["version"]
            except Exception as e:
                print(f"WARNING: PyPI query failed for {pkg['package']}: {e}", file=sys.stderr)
                continue

            def ver_tuple(v):
                return tuple(int(x) for x in re.findall(r'\d+', v))

            if ver_tuple(latest) > ver_tuple(pkg['currentVersion']):
                pkg['latestVersion'] = latest
                packages_to_upgrade.append(pkg)
                print(f"  {pkg['package']}: {pkg['currentVersion']} -> {latest}", file=sys.stderr)
            else:
                print(f"  {pkg['package']}: up to date ({pkg['currentVersion']})", file=sys.stderr)

        if not packages_to_upgrade:
            print(json.dumps({"status": "all_up_to_date", "packages": []}))
            sys.exit(0)

        # ── Phase 3: Read Dockerfile patch list ────────────────────

        dockerfile_path = os.path.join(SVC_PATH, "Dockerfile")
        dockerfile_ref_patches = set()
        if os.path.isfile(dockerfile_path):
            with open(dockerfile_path) as df:
                for line in df:
                    m = re.search(r'patches/(\S+\.patch)', line)
                    if m:
                        dockerfile_ref_patches.add(m.group(1))

        # ── Phase 4: Process each package ──────────────────────────

        all_results = []

        for pkg_info in packages_to_upgrade:
            PKG = pkg_info['package']
            CUR_VER = pkg_info['currentVersion']
            NEW_VER = pkg_info['latestVersion']
            GH_ORG = pkg_info['ghOrg']
            GH_REPO = pkg_info['ghRepo']
            PATCH_PREFIX = pkg_info['patchDirPrefix']

            print(f"\nProcessing {PKG}: {CUR_VER} -> {NEW_VER}", file=sys.stderr)

            repo_path = os.path.join(WORKDIR, GH_REPO)
            clone_url = f"https://github.com/{GH_ORG}/{GH_REPO}.git"
            if os.path.isdir(repo_path):
                run("git fetch --tags --force", cwd=repo_path)
            else:
                run(f"git clone {clone_url} {repo_path}")
            run("git config user.email upgrade@local", cwd=repo_path, check=False)
            run("git config user.name upgrade", cwd=repo_path, check=False)

            new_tag = resolve_tag(repo_path, NEW_VER)
            if not new_tag:
                all_results.append({
                    "package": PKG, "currentVersion": CUR_VER, "latestVersion": NEW_VER,
                    "error": f"Tag {NEW_VER} (or v{NEW_VER}) not found", "patches": [],
                })
                continue

            old_tag = resolve_tag(repo_path, CUR_VER)
            reset_repo(repo_path, new_tag)

            # Find matching patches
            patches_dir = os.path.join(SVC_PATH, "images", "assets", "patches")
            patch_files = sorted(glob.glob(os.path.join(patches_dir, "*.patch")))
            matching_patches = []
            for pf in patch_files:
                fname = os.path.basename(pf)
                if fname not in dockerfile_ref_patches:
                    continue
                with open(pf) as f:
                    content = f.read()
                if re.search(rf"diff --git a/{re.escape(PATCH_PREFIX)}/", content):
                    matching_patches.append({"filename": fname, "path": pf})

            if not matching_patches:
                all_results.append({
                    "package": PKG, "currentVersion": CUR_VER, "latestVersion": NEW_VER,
                    "newTag": new_tag, "patches": [], "summary": "No patches target this package",
                })
                continue

            print(f"  Found {len(matching_patches)} patches", file=sys.stderr)

            # ── Group, test, regenerate ────────────────────────────
            patch_results = []
            groups = find_patch_groups(matching_patches, PATCH_PREFIX)

            for group in groups:
                if len(group) == 1:
                    mp = group[0]
                    pf, fname = mp["path"], mp["filename"]

                    # Test clean apply
                    reset_repo(repo_path, new_tag)
                    dry = run(f"patch --dry-run -p1 < {pf}", cwd=repo_path, check=False)
                    if dry.returncode == 0:
                        patch_results.append({"filename": fname, "status": "applied", "details": "Applied cleanly"})
                        continue

                    if not old_tag:
                        patch_results.append({"filename": fname, "status": "failed", "details": f"Cannot regenerate: old tag {CUR_VER} not found"})
                        continue

                    # Regenerate: apply at old tag, diff against new tag
                    print(f"  Regenerating {fname}...", file=sys.stderr)
                    new_diff, error = regenerate_patch(repo_path, old_tag, new_tag, pf, PATCH_PREFIX)

                    if error and new_diff is None:
                        patch_results.append({"filename": fname, "status": "conflicts", "details": f"Regeneration failed: {error}"})
                        continue

                    if new_diff == "":
                        print(f"  {fname}: upstreamed, deleting", file=sys.stderr)
                        os.remove(pf)
                        remove_patch_from_dockerfile(dockerfile_path, fname)
                        patch_results.append({"filename": fname, "status": "upstreamed", "details": "Deleted"})
                        continue

                    # Write regenerated patch
                    with open(pf) as f:
                        orig = f.read()
                    with open(pf, 'w') as f:
                        f.write(rebuild_patch_file(pf, PATCH_PREFIX, new_diff, orig))

                    ok, err = verify_patch(repo_path, new_tag, pf)
                    patch_results.append({
                        "filename": fname,
                        "status": "regenerated" if ok else "regen_verify_failed",
                        "details": "Regenerated and verified clean" if ok else f"Verify failed: {err}",
                    })

                else:
                    # Multi-patch group: test each independently first
                    independent, needs_work = [], []
                    for mp in group:
                        reset_repo(repo_path, new_tag)
                        dry = run(f"patch --dry-run -p1 < {mp['path']}", cwd=repo_path, check=False)
                        (independent if dry.returncode == 0 else needs_work).append(mp)

                    if not needs_work:
                        for mp in independent:
                            patch_results.append({"filename": mp["filename"], "status": "applied", "details": "Applied cleanly"})
                        continue

                    # Check if needs_work patches depend on independent ones
                    depends, truly_broken = [], []
                    if independent:
                        reset_repo(repo_path, new_tag)
                        for mp in independent:
                            run(f"patch --no-backup-if-mismatch -p1 < {mp['path']}", cwd=repo_path, check=False)
                            run("find . -name '*.orig' -o -name '*.rej' | xargs rm -f", cwd=repo_path, check=False)
                        for mp in needs_work:
                            dry = run(f"patch --dry-run -p1 < {mp['path']}", cwd=repo_path, check=False)
                            (depends if dry.returncode == 0 else truly_broken).append(mp)
                    else:
                        truly_broken = needs_work

                    if depends:
                        to_combine = independent + depends
                        names = [mp["filename"] for mp in to_combine]
                        print(f"  Combining: {', '.join(names)}", file=sys.stderr)

                        if not old_tag:
                            for mp in independent:
                                patch_results.append({"filename": mp["filename"], "status": "applied", "details": "Applied cleanly"})
                            for mp in depends:
                                patch_results.append({"filename": mp["filename"], "status": "failed", "details": "Cannot regenerate: old tag not found"})
                        else:
                            cd, err = combine_patches(repo_path, old_tag, new_tag, to_combine, PATCH_PREFIX)

                            if err and cd is None:
                                for mp in independent:
                                    patch_results.append({"filename": mp["filename"], "status": "applied", "details": "Applied cleanly"})
                                for mp in depends:
                                    patch_results.append({"filename": mp["filename"], "status": "conflicts", "details": f"Cannot combine: {err}"})
                            elif cd == "":
                                for mp in to_combine:
                                    fn = mp["filename"]
                                    if os.path.isfile(mp["path"]):
                                        os.remove(mp["path"])
                                    remove_patch_from_dockerfile(dockerfile_path, fn)
                                    patch_results.append({"filename": fn, "status": "upstreamed", "details": "Deleted"})
                            else:
                                first = to_combine[0]
                                with open(first["path"]) as f:
                                    orig = f.read()
                                with open(first["path"], 'w') as f:
                                    f.write(rebuild_patch_file(first["path"], PATCH_PREFIX, cd, orig))

                                for mp in to_combine[1:]:
                                    fn = mp["filename"]
                                    if os.path.isfile(mp["path"]):
                                        os.remove(mp["path"])
                                    remove_patch_from_dockerfile(dockerfile_path, fn)

                                ok, err = verify_patch(repo_path, new_tag, first['path'])
                                cn = " + ".join(names)
                                patch_results.append({
                                    "filename": first["filename"],
                                    "status": "combined" if ok else "combined_verify_failed",
                                    "details": f"Combined from: {cn}" if ok else f"Combined but verify failed: {err}",
                                    "combined_from": names,
                                })
                    else:
                        for mp in independent:
                            patch_results.append({"filename": mp["filename"], "status": "applied", "details": "Applied cleanly"})

                    # Handle truly broken patches individually
                    for mp in truly_broken:
                        pf, fname = mp["path"], mp["filename"]
                        if not old_tag:
                            patch_results.append({"filename": fname, "status": "failed", "details": "Cannot regenerate: old tag not found"})
                            continue
                        print(f"  Regenerating {fname}...", file=sys.stderr)
                        nd, err = regenerate_patch(repo_path, old_tag, new_tag, pf, PATCH_PREFIX)
                        if err and nd is None:
                            patch_results.append({"filename": fname, "status": "conflicts", "details": f"Regeneration failed: {err}"})
                        elif nd == "":
                            os.remove(pf)
                            remove_patch_from_dockerfile(dockerfile_path, fname)
                            patch_results.append({"filename": fname, "status": "upstreamed", "details": "Deleted"})
                        else:
                            with open(pf) as f:
                                orig = f.read()
                            with open(pf, 'w') as f:
                                f.write(rebuild_patch_file(pf, PATCH_PREFIX, nd, orig))
                            ok, err = verify_patch(repo_path, new_tag, pf)
                            patch_results.append({
                                "filename": fname,
                                "status": "regenerated" if ok else "regen_verify_failed",
                                "details": "Regenerated and verified clean" if ok else f"Verify failed: {err}",
                            })

            applied = sum(1 for p in patch_results if p["status"] == "applied")
            regen = sum(1 for p in patch_results if p["status"] == "regenerated")
            comb = sum(1 for p in patch_results if p["status"] == "combined")
            ups = sum(1 for p in patch_results if p["status"] == "upstreamed")
            conf = sum(1 for p in patch_results if p["status"] == "conflicts")
            vf = sum(1 for p in patch_results if p["status"] in ("regen_verify_failed", "combined_verify_failed"))

            all_results.append({
                "package": PKG, "currentVersion": CUR_VER, "latestVersion": NEW_VER,
                "newTag": new_tag, "oldTag": old_tag or "not_found",
                "patches": patch_results,
                "summary": f"{len(patch_results)} patches: {applied} applied, {regen} regenerated, {comb} combined, {ups} upstreamed, {conf} conflicts, {vf} verify-failed",
            })

        # ── Phase 5: Update pulp-service files ─────────────────────

        deleted_patches = set()
        combined_into = {}
        version_updates = {}

        for pkg_result in all_results:
            pkg_name = pkg_result.get("package", "")
            new_ver = pkg_result.get("latestVersion", "")
            for p in pkg_result.get("patches", []):
                if p["status"] == "upstreamed":
                    deleted_patches.add(p["filename"])
                elif p["status"] in ("combined", "combined_verify_failed"):
                    survivor = p["filename"]
                    for absorbed in p.get("combined_from", [])[1:]:
                        deleted_patches.add(absorbed)
                        combined_into.setdefault(survivor, []).append(absorbed)
            if new_ver and pkg_result.get("patches"):
                for pkg_def in packages_to_upgrade:
                    if pkg_def["package"] == pkg_name:
                        version_updates[pkg_def["patchDirPrefix"]] = new_ver

        if "pulpcore" in version_updates:
            version_updates["pulp_file"] = version_updates["pulpcore"]

        # Update requirements.txt
        if version_updates:
            req_path = os.path.join(SVC_PATH, "pulp_service", "requirements.txt")
            if os.path.isfile(req_path):
                pkg_ver_map = {}
                for pkg_def in packages_to_upgrade:
                    if pkg_def["patchDirPrefix"] in version_updates:
                        pkg_ver_map[pkg_def["package"]] = version_updates[pkg_def["patchDirPrefix"]]
                with open(req_path) as f:
                    req_lines = f.readlines()
                with open(req_path, 'w') as f:
                    for line in req_lines:
                        matched = False
                        for pkg_name, new_ver in pkg_ver_map.items():
                            normalized = re.sub(r'[-_.]+', '[-_.]+', pkg_name.lower())
                            if re.match(rf'^({normalized})==', line.strip(), re.IGNORECASE):
                                f.write(f"{pkg_name}=={new_ver}\n")
                                matched = True
                                break
                        if not matched:
                            f.write(line)
                print("Updated requirements.txt", file=sys.stderr)

        # Update CLAUDE.md
        if deleted_patches or combined_into or version_updates:
            with open(claude_path) as f:
                lines = f.readlines()
            new_lines = []
            skip_section = False
            current_patch_name = None
            i = 0
            while i < len(lines):
                line = lines[i]
                if line.startswith("| `") and "`" in line:
                    for prefix, new_ver in version_updates.items():
                        pat = re.compile(r'(\|\s*`' + re.escape(prefix) + r'/`\s*\|.*\|\s*)\S+(\s*\|)\s*$')
                        m = pat.match(line)
                        if m:
                            line = m.group(1) + new_ver + m.group(2) + "\n"
                            break
                section_match = re.match(r'^### (\d{4})\s', line)
                if section_match:
                    patch_num = section_match.group(1)
                    if any(d.startswith(patch_num + "-") for d in deleted_patches):
                        skip_section = True
                        i += 1
                        continue
                    else:
                        skip_section = False
                        current_patch_name = None
                        for fn in combined_into:
                            if fn.startswith(patch_num + "-"):
                                current_patch_name = fn
                                break
                if skip_section:
                    if i + 1 < len(lines) and re.match(r'^### \d{4}\s', lines[i + 1]):
                        skip_section = False
                    elif i + 1 >= len(lines):
                        skip_section = False
                    else:
                        i += 1
                        continue
                new_lines.append(line)
                if current_patch_name and line.strip().startswith("- **Description:**"):
                    absorbed = combined_into[current_patch_name]
                    new_lines.append(f"- **Note:** Includes changes from: {', '.join(absorbed)}\n")
                    current_patch_name = None
                i += 1
            with open(claude_path, 'w') as f:
                f.writelines(new_lines)
            print("Updated CLAUDE.md", file=sys.stderr)

        print(json.dumps({"packages": all_results}))
        PYEOF
